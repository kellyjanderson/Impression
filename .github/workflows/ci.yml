name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CMAKE_ARGS: "-DMANIFOLD_PAR=OFF"
      PYTHONPATH: "src"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build scikit-build-core cmake ninja

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Build package
        run: |
          python -m build

      - name: Run tests
        run: |
          python -m pytest \
            tests/test_sdf.py \
            tests/test_reference_review_preview_payload.py \
            tests/test_reference_review_preview_payload_controller.py \
            tests/test_reference_review_ui_shell.py \
            tests/test_reference_review_ui_workflow.py
