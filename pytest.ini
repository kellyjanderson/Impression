[pytest]
markers =
    deprecation: tests that intentionally exercise deprecated APIs or legacy compatibility behavior
    surfacebody: tests that exercise the canonical SurfaceBody kernel and its consumers
    loft: tests that exercise the canonical loft planner/executor and modern loft entrypoints
    reference_image: tests that render and compare reference images
    preview: tests that exercise rendering/preview flows
    stl: tests that exercise STL export/geometry checks
    smoke: lightweight sanity tests
filterwarnings =
    error::DeprecationWarning
